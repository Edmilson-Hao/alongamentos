<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#e63946">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Mobilidade Ed</title>
    
    <link rel="manifest" href="data:application/manifest+json;base64,ewogICJuYW1lIjogIk1vYmlsaWRhZGUgRWQiLAogICJzaG9ydF9uYW1lIjogIk1vYmlsRWRfIiwKICAic3RhcnRfdXJsIjogIi4vIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjZTYzOTQ2IiwKICAidGhlbWVfY29sb3IiOiAiI2U2Mzk0NiIsCiAgImljb25zIjogW3sgInNyYyI6ICJodHRwczovL2Nkbi1pY29ucy9wbmcvUxIvcC8zMTc3LzMxNzc0NjIucG5nIiwgInNpemVzIjogIjUxMng1MTIiLCAidHlwZSI6ICJpbWFnZS9wbmciLCAicHVycG9zZSI6ICJhbnkgbWFza2FibGUiIH1dCn0=">

    <style>
        :root { --primary: #e63946; --dark: #1d3557; --light: #f1faee; --accent: #457b9d; }
        
        @keyframes flashRed {
            0% { background-color: var(--light); }
            50% { background-color: #ffcccc; }
            100% { background-color: var(--light); }
        }
        .flash-active { animation: flashRed 0.5s infinite; }

        body { 
            font-family: 'Segoe UI', sans-serif; background-color: var(--light); color: var(--dark); 
            margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; 
        }
        .container { max-width: 500px; width: 100%; padding-bottom: 30px; }
        h1 { text-align: center; color: var(--primary); font-size: 1.4rem; margin: 10px 0; text-transform: uppercase; }

        /* Botão de Instalação Estilizado */
        #installBtn {
            display: none; /* Escondido por padrão */
            width: 100%;
            padding: 15px;
            background: var(--dark);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            margin-bottom: 15px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(29, 53, 87, 0.3);
            text-align: center;
        }

        .timer-card { 
            background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            text-align: center; margin-bottom: 20px; position: sticky; top: 10px; z-index: 100; border: 1px solid #ddd; 
        }
        #display { font-size: 3.5rem; font-weight: bold; margin: 5px 0; }
        
        .timer-btns { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin-bottom: 10px; }
        .timer-btns button { padding: 12px 5px; border: none; border-radius: 8px; background: var(--accent); color: white; font-weight: bold; flex: 1; cursor: pointer; }
        
        .control-btns { display: flex; gap: 10px; }
        .control-btns button { padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; flex: 1; cursor: pointer; }

        .exercise-item { background: white; margin-bottom: 12px; border-radius: 12px; overflow: hidden; border: 1px solid #eee; }
        .exercise-header { padding: 18px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid var(--primary); }
        .video-container { display: none; width: 100%; background: #000; aspect-ratio: 9 / 16; }
        .video-container iframe { width: 100%; height: 100%; border: none; }
        .details { padding: 12px 18px; font-size: 0.9rem; color: #555; background: #fafafa; border-top: 1px solid #eee; }
        .completed-checkbox { width: 26px; height: 26px; accent-color: var(--primary); cursor: pointer; }
        
        .reset-all { width: 100%; padding: 16px; background: #666; color: white; border: none; border-radius: 10px; margin-top: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body id="body">

<div class="container">
    <button id="installBtn">📲 INSTALAR APP MOBILIDADE</button>

    <h1>Mobilidade Ed | Power</h1>

    <div class="timer-card">
        <div id="display">00:00</div>
        <div class="timer-btns">
            <button onclick="setTimer(15)">15s</button>
            <button onclick="setTimer(30)">30s</button>
            <button onclick="setTimer(45)">45s</button>
            <button onclick="setTimer(60)">60s</button>
        </div>
        <div class="control-btns">
            <button id="startBtn" onclick="toggleTimer()">Iniciar</button>
            <button onclick="resetTimer()" style="background:#666;">Reset</button>
        </div>
    </div>

    <div id="exerciseList">
        <div class="exercise-item">
            <div class="exercise-header" onclick="playVideo('v1', 'https://www.youtube.com/embed/TIJu5aWPke0?si=VGdAe3P1yWApwzPC')">
                <div class="title-group">1. Couch Stretch</div>
                <input type="checkbox" class="completed-checkbox" onclick="event.stopPropagation()">
            </div>
            <div class="details">2 séries x 45s/lado.</div>
            <div id="v1" class="video-container"></div>
        </div>
        </div>

    <button class="reset-all" onclick="resetCheckboxes()">Resetar Treino Completo</button>
</div>

<script>
    // Lógica de Instalação
    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = 'block'; // Mostra o botão se puder instalar
    });

    installBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                installBtn.style.display = 'none';
            }
            deferredPrompt = null;
        }
    });

    // Timer, Som e Flash
    let timer; let timeLeft = 0; let isRunning = false;
    const display = document.getElementById('display');
    const body = document.getElementById('body');
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playBeep() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }

    function setTimer(s) { stopEffects(); clearInterval(timer); timeLeft = s; isRunning = false; updateDisplay(); document.getElementById('startBtn').innerText = "Iniciar"; }
    function updateDisplay() {
        const mins = Math.floor(timeLeft / 60); const secs = timeLeft % 60;
        display.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
    }

    function toggleTimer() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (isRunning) { clearInterval(timer); document.getElementById('startBtn').innerText = "Iniciar"; }
        else {
            if (timeLeft <= 0) return;
            stopEffects();
            timer = setInterval(() => {
                timeLeft--; updateDisplay();
                if (timeLeft <= 0) { 
                    clearInterval(timer); isRunning = false; 
                    document.getElementById('startBtn').innerText = "Iniciar";
                    body.classList.add('flash-active');
                    display.style.color = 'var(--primary)';
                    playBeep();
                }
            }, 1000);
            document.getElementById('startBtn').innerText = "Pausar";
        }
        isRunning = !isRunning;
    }

    function stopEffects() { body.classList.remove('flash-active'); display.style.color = 'var(--dark)'; }
    function resetTimer() { stopEffects(); clearInterval(timer); timeLeft = 0; isRunning = false; updateDisplay(); }

    function playVideo(id, url) {
        const container = document.getElementById(id);
        const isVisible = container.style.display === 'block';
        document.querySelectorAll('.video-container').forEach(c => { c.style.display = 'none'; c.innerHTML = ''; });
        if (!isVisible) {
            container.style.display = 'block';
            container.innerHTML = `<iframe src="${url}" allow="autoplay; encrypted-media;" allowfullscreen></iframe>`;
        }
    }

    function resetCheckboxes() { document.querySelectorAll('.completed-checkbox').forEach(cb => cb.checked = false); }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js'); });
    }
</script>
</body>
</html>
